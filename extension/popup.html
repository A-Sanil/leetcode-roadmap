<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #f1f5f9;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #1e293b;
    }
    .header-icon { font-size: 22px; }
    .header-title { font-size: 14px; font-weight: 700; }
    .header-sub { font-size: 11px; color: #64748b; margin-top: 1px; }

    .body { padding: 16px; }

    /* Status card */
    .status-card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 52px;
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #334155;
    }
    .status-dot.green  { background: #22c55e; box-shadow: 0 0 6px #22c55e80; }
    .status-dot.yellow { background: #eab308; box-shadow: 0 0 6px #eab30880; }
    .status-dot.red    { background: #ef4444; box-shadow: 0 0 6px #ef444480; }
    .status-dot.spin   { background: #3b82f6; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }
    .status-text { font-size: 12px; color: #94a3b8; line-height: 1.4; }
    .status-text strong { color: #f1f5f9; font-weight: 600; }

    /* Main button */
    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, background .15s;
    }
    .btn:disabled { opacity: .45; cursor: default; }
    .btn-connect  { background: #f97316; color: #fff; }
    .btn-connect:not(:disabled):hover  { background: #ea6c0a; }
    .btn-connected { background: #16a34a; color: #fff; }
    .btn-connected:not(:disabled):hover { background: #15803d; }
    .btn-disconnect { background: #1e293b; color: #94a3b8; margin-top: 8px; }
    .btn-disconnect:not(:disabled):hover { background: #273549; color: #e2e8f0; }

    /* Help text */
    .hint {
      font-size: 11px;
      color: #475569;
      line-height: 1.5;
      margin-top: 12px;
    }
    .hint a { color: #3b82f6; text-decoration: none; }
    .hint a:hover { text-decoration: underline; }

    /* App offline banner */
    .offline-banner {
      background: #1e1a0f;
      border: 1px solid #78350f;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px;
      color: #d97706;
      line-height: 1.5;
      margin-bottom: 14px;
      display: none;
    }
    .offline-banner.visible { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">🧩</span>
    <div>
      <div class="header-title">LeetCode Roadmap</div>
      <div class="header-sub">Account connector</div>
    </div>
  </div>

  <div class="body">
    <div id="offlineBanner" class="offline-banner">
      ⚠️ Roadmap app isn't running.<br>
      Launch <strong>LeetCode Roadmap.exe</strong> first, then try again.
    </div>

    <div class="status-card">
      <div id="statusDot" class="status-dot"></div>
      <div id="statusText" class="status-text">Checking…</div>
    </div>

    <button id="mainBtn" class="btn btn-connect" disabled>Connect Account</button>
    <button id="disconnectBtn" class="btn btn-disconnect" style="display:none">Disconnect</button>

    <p class="hint" id="hint"></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
